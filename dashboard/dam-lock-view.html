<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三峡大坝 · 船闸三维模型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0e1a;overflow:hidden;height:100vh;width:100vw;font-family:'Noto Sans SC',sans-serif}
#container{position:fixed;inset:0}
canvas{display:block}

#info{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:10;font-size:11px;color:rgba(255,255,255,0.25);
  letter-spacing:1px;pointer-events:none;
  background:rgba(10,14,26,0.6);padding:6px 18px;border-radius:20px;
  border:1px solid rgba(255,255,255,0.04);
}

#legend{
  position:fixed;top:14px;left:14px;z-index:10;
  display:flex;flex-direction:column;gap:4px;
}
.legend-item{
  display:flex;align-items:center;gap:8px;
  font-size:10px;color:rgba(255,255,255,0.45);
  background:rgba(10,14,26,0.5);padding:3px 10px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.04);
}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

.view-hint{
  position:fixed;top:14px;right:14px;z-index:10;
  font-size:10px;color:rgba(255,255,255,0.2);
  text-align:right;line-height:1.6;
}
</style>
</head>
<body>
<div id="container"></div>
<div id="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#7a8a9a"></span>混凝土重力坝</div>
  <div class="legend-item"><span class="legend-dot" style="background:#667788"></span>弧形泄洪闸</div>
  <div class="legend-item"><span class="legend-dot" style="background:#9aaaba"></span>发电厂房</div>
  <div class="legend-item"><span class="legend-dot" style="background:linear-gradient(180deg,#3a4a5a,#5a6a7a)"></span>五级船闸</div>
</div>
<div class="view-hint">鼠标拖拽旋转 · 滚轮缩放</div>
<div id="info">三峡大坝坝体 · 弧形泄洪闸 · 坝后发电厂房 · 五级船闸</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0e1a');
scene.background = new THREE.Color('#070b14');

const camera = new THREE.PerspectiveCamera(42, container.clientWidth/container.clientHeight, 0.1, 100);
camera.position.set(6, 4, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ── 灯光 ──
scene.add(new THREE.AmbientLight('#334466', 0.8));
const sun = new THREE.DirectionalLight('#ffe8d0', 2.5);
sun.position.set(8, 12, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
scene.add(sun);
const fill = new THREE.DirectionalLight('#8899cc', 0.3);
fill.position.set(-4, 2, -8);
scene.add(fill);
const rim = new THREE.DirectionalLight('#ffaa66', 0.5);
rim.position.set(-2, 4, 10);
scene.add(rim);

// ── 地面 ──
const grid = new THREE.GridHelper(20, 20, 0x003366, 0x002244);
grid.position.y = -0.95;
grid.material.transparent = true;
grid.material.opacity = 0.12;
scene.add(grid);

// ── 材质 ──
const concreteMat = new THREE.MeshStandardMaterial({ color: '#7a8a9a', roughness: 0.6, metalness: 0.15 });
const darkMat = new THREE.MeshStandardMaterial({ color: '#3a4a5a', roughness: 0.7, metalness: 0.1 });
const lightMat = new THREE.MeshStandardMaterial({ color: '#9aaaba', roughness: 0.5, metalness: 0.2 });
const roadMat = new THREE.MeshStandardMaterial({ color: '#4a5555', roughness: 0.9, metalness: 0.05 });
const waterMat = new THREE.MeshStandardMaterial({ color: '#1a3a5a', roughness: 0.3, metalness: 0.4, transparent: true, opacity: 0.5 });
const metalMat = new THREE.MeshStandardMaterial({ color: '#667788', roughness: 0.3, metalness: 0.7 });
const roofMat = new THREE.MeshStandardMaterial({ color: '#5a6a7a', roughness: 0.6, metalness: 0.3 });

const dam = new THREE.Group();

// ═══ 坝体（梯形重力坝）═══
const shape = new THREE.Shape();
shape.moveTo(-3.2, -0.95);
shape.lineTo(-2.85, 1.2);
shape.lineTo(2.85, 1.2);
shape.lineTo(3.2, -0.95);
shape.closePath();
const body = new THREE.Mesh(new THREE.ExtrudeGeometry(shape, { depth: 2.0, bevelEnabled: true, bevelSize: 0.03, bevelThickness: 0.03 }), concreteMat);
body.castShadow = true; body.receiveShadow = true;
dam.add(body);

// 横向施工缝线
for (let y = -0.6; y <= 0.9; y += 0.25) {
  const line = new THREE.Mesh(new THREE.BoxGeometry(5.7, 0.015, 2.05), new THREE.MeshStandardMaterial({ color: '#5a6a7a', roughness: 0.8 }));
  line.position.set(0, y, 0); dam.add(line);
}

// ═══ 弧形泄洪闸（11孔）═══
for (let i = -2.5; i <= 2.5; i += 0.53) {
  const gate = new THREE.Group();
  const panel = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.5, 0.05), metalMat);
  panel.position.set(0, 0, 0); gate.add(panel);

  const arch = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.015, 6, 8, Math.PI * 0.6), darkMat);
  arch.rotation.x = Math.PI / 2;
  arch.position.set(0, 0.08, 0.06); gate.add(arch);

  const brace = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.45, 4), darkMat);
  brace.position.set(0, 0.25, 0.02); gate.add(brace);

  gate.position.set(i, 0.45, 1.03); dam.add(gate);
}

// ═══ 坝顶公路 + 护栏 ═══
const road = new THREE.Mesh(new THREE.BoxGeometry(5.4, 0.06, 0.45), roadMat);
road.position.set(0, 1.22, 0); road.castShadow = true; dam.add(road);

for (let side of [-1, 1]) {
  const rail = new THREE.Mesh(new THREE.BoxGeometry(5.4, 0.04, 0.03), new THREE.MeshStandardMaterial({ color: '#889999', roughness: 0.5, metalness: 0.3 }));
  rail.position.set(0, 1.28, side * 0.25); dam.add(rail);
}

// ═══ 坝后厂房 ═══
const plant = new THREE.Group();
const pb = new THREE.Mesh(new THREE.BoxGeometry(4.6, 0.55, 0.5), lightMat);
pb.position.set(0, -0.65, 1.45); plant.add(pb);
const pr = new THREE.Mesh(new THREE.BoxGeometry(4.7, 0.05, 0.53), roofMat);
pr.position.set(0, -0.36, 1.45); plant.add(pr);

// 窗户
for (let i = -1.9; i <= 1.9; i += 0.5) {
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.13, 0.02), new THREE.MeshStandardMaterial({ color: '#ffdd88', emissive: '#ffdd66', emissiveIntensity: 0.2 }));
  w.position.set(i, -0.65, 1.71); plant.add(w);
}
// 尾水管
for (let i = -1.9; i <= 1.9; i += 0.8) {
  const p = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.11, 0.12, 8), darkMat);
  p.rotation.x = Math.PI / 2;
  p.position.set(i, -0.95, 1.62); plant.add(p);
}
dam.add(plant);

// ═══ 五级船闸 ═══
const lock = new THREE.Group();
const lb = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.5, 1.8), concreteMat);
lb.position.set(-3.5, -0.55, -0.1); lock.add(lb);

for (let st = 0; st < 5; st++) {
  const rh = 0.04 + st * 0.07;
  const rm = new THREE.Mesh(new THREE.BoxGeometry(0.75, rh, 1.4), new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(0.55, 0.1, 0.2 + st * 0.05),
    roughness: 0.7, metalness: 0.1,
  }));
  rm.position.set(-3.5, -0.3 + rh / 2, -0.1); lock.add(rm);

  const d = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.15, 1.45), metalMat);
  d.position.set(-3.5, -0.15 + st * 0.07, -0.1 + 1.4 / 2 * (st < 2 ? -1 : 1));
  lock.add(d);
}
// 船闸围墙
for (let side of [-1, 1]) {
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.35, 1.8), concreteMat);
  w.position.set(-3.5 + side * 0.75 / 2, -0.25, -0.1); lock.add(w);
}
dam.add(lock);

// ═══ 输电塔 ═══
function makeTower(x) {
  const g = new THREE.Group();
  const tm = new THREE.MeshStandardMaterial({ color: '#556677', roughness: 0.7, metalness: 0.2 });

  for (let dx of [-0.05, 0.05]) {
    for (let dz of [-0.05, 0.05]) {
      const l = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.02, 1.4, 4), tm);
      l.position.set(dx, 0.7, dz - 0.55); g.add(l);
    }
  }
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.015, 0.015), tm);
  arm.position.set(0, 1.1, -0.3); g.add(arm);
  const arm2 = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.015, 0.015), tm);
  arm2.position.set(0, 0.95, -0.3); g.add(arm2);

  for (let ax of [-0.1, 0, 0.1]) {
    const isl = new THREE.Mesh(new THREE.SphereGeometry(0.012, 4, 4), new THREE.MeshStandardMaterial({ color: '#cccccc', roughness: 0.3 }));
    isl.position.set(ax, 1.06, -0.3); g.add(isl);
  }
  g.position.set(x, -2.75, -0.75); return g;
}
dam.add(makeTower(-4.0));
dam.add(makeTower(4.0));

// ═══ 坝前水面 ═══
const ws = new THREE.Mesh(new THREE.PlaneGeometry(6.5, 2.2), waterMat);
ws.rotation.x = -Math.PI / 2;
ws.position.set(0, -0.55, 2.2); dam.add(ws);

// ═══ 进水口拦污栅（坝前）═══
for (let i = -2.2; i <= 2.2; i += 0.45) {
  const trash = new THREE.Mesh(
    new THREE.BoxGeometry(0.005, 0.3, 0.08),
    new THREE.MeshStandardMaterial({ color: '#556677', roughness: 0.7 })
  );
  trash.position.set(i, 0.25, 2.1);
  dam.add(trash);
}

scene.add(dam);

// ═══ 自动旋转动画 ═══
let autoRotate = true;
renderer.domElement.addEventListener('pointerdown', () => { autoRotate = false; });

function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) {
    dam.rotation.y += 0.002;
  }
  controls.update();
  renderer.render(scene, camera);
}
animate();

// 自适应
new ResizeObserver(() => {
  const w = container.clientWidth, h = container.clientHeight;
  if (w > 0 && h > 0) {
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
}).observe(container);
</script>
</body>
</html>
